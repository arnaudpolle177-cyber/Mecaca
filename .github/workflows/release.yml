name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build runtime
        shell: pwsh
        run: .\MecchaCamouflage\scripts\build.ps1 -RuntimeRoot "${{ github.workspace }}\MecchaCamouflage"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: meccha-camouflage
          path: MecchaCamouflage\.build\bin\meccha-camouflage.exe
